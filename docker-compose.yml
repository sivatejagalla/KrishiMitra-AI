version: "3.9"

services:
  agrolith-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: agrolith-ai-backend
    image: agrolith-ai:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override or supplement .env values here if needed
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount Firebase credentials if available (do not bake into image)
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
      # Persist SQLite database on host
      - agrolith-db:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agrolith-net

networks:
  agrolith-net:
    driver: bridge

volumes:
  agrolith-db:
    driver: local
