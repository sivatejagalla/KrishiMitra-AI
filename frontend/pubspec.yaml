name: agrolith_ai
description: Agrolith-AI — Intelligent Farming Assistant for Indian Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP & Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Storage & Caching
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Voice & Audio
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0
  record: ^5.1.1
  just_audio: ^0.9.39

  # Image & Media
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  avatar_glow: ^3.0.0
  fl_chart: ^0.68.0
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  uuid: ^4.4.0
  image: ^4.2.0
  path: ^1.9.0
  mime: ^1.0.5

  # UI Components
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
